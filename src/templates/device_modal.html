<!-- Device Edit/Add Modal -->
<div class="modal fade" id="deviceModal" tabindex="-1" aria-labelledby="deviceModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deviceModalLabel">Add New Device</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" onclick="closeDeviceModal()"></button>
            </div>
            <div class="modal-body">
                <form id="deviceForm">
                    <input type="hidden" id="originalMac" name="originalMac">
                    <div class="mb-3">
                        <label for="product" class="form-label">Product</label>
                        <input type="text" class="form-control" id="product" name="Product" required>
                    </div>
                    <div class="mb-3">
                        <label for="type" class="form-label">Type</label>
                        <input type="text" class="form-control" id="type" name="Type" required>
                    </div>
                    <div class="mb-3">
                        <label for="mac" class="form-label">MAC Address</label>
                        <input type="text" class="form-control" id="mac" name="MAC" required>
                    </div>
                    <div class="mb-3">
                        <label for="pairingCode" class="form-label">Pairing Code</label>
                        <input type="text" class="form-control" id="pairingCode" name="Pairing Code">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <input type="text" class="form-control" id="description" name="Description">
                    </div>
                    <div class="mb-3">
                        <label for="qr" class="form-label d-flex justify-content-between">
                            QR Data
                            <div class="dropdown d-inline-block">
                                <button type="button" class="btn btn-sm btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                                    <i class="fa-solid fa-camera"></i>
                                </button>
                                <ul class="dropdown-menu">
                                    <li><button type="button" class="dropdown-item" onclick="startScanner()"><i class="fa-solid fa-video me-1"></i> Use Camera</button></li>
                                    <li><button type="button" class="dropdown-item" onclick="document.getElementById('qrFileInput').click()"><i class="fa-solid fa-file-image me-1"></i> Upload Image</button></li>
                                </ul>
                            </div>
                        </label>
                        <input type="text" class="form-control" id="qr" name="QR">
                        <input type="file" id="qrFileInput" accept="image/*" style="display: none;" onchange="handleQRFile(this)">
                    </div>
                    <!-- QR Reader Container -->
                    <div id="qr-reader" style="width: 100%; display: none; margin-bottom: 1rem;"></div>
                    <button type="button" id="stopScannerBtn" class="btn btn-sm btn-danger mb-3" style="display: none;" onclick="stopScanner()">Stop Scanner</button>
                </form>
            </div>
            <div class="modal-footer justify-content-between">
                <div>
                    <button type="button" id="deleteBtn" class="btn btn-danger" onclick="deleteDevice()" style="display: none;">Delete</button>
                </div>
                <div>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" onclick="closeDeviceModal()">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveDevice()">Save</button>
                </div>
            </div>
        </div>
    </div>
</div>
