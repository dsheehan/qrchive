name: Docker Image CI

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-python:
    name: Run Python Tests
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/astral-sh/uv:python3.14-trixie-slim
    outputs:
      results: ${{ steps.python-tests.outputs.summary }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        uv sync

    - name: Run unit tests
      id: python-tests
      run: |
        uv run pytest --junitxml=pytest-results.xml
        PASSED=$(grep -oP 'tests="\K[^"]+' pytest-results.xml | head -1)
        FAILURES=$(grep -oP 'failures="\K[^"]+' pytest-results.xml | head -1)
        ERRORS=$(grep -oP 'errors="\K[^"]+' pytest-results.xml | head -1)
        echo "summary=Python Tests: $PASSED passed, $FAILURES failures, $ERRORS errors" >> $GITHUB_OUTPUT

    - name: Upload Python test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: python-test-results
        path: pytest-results.xml

  test-js:
    name: Run JS Tests
    runs-on: ubuntu-latest
    container:
      image: node:20-slim
    outputs:
      results: ${{ steps.js-tests.outputs.summary }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Node.js dependencies
      run: |
        npm install

    - name: Run Node.js unit tests
      id: js-tests
      run: |
        npm test -- --test-reporter=junit --test-reporter-destination=js-results.xml > test-output.txt 2>&1 || true
        cat test-output.txt
        # Re-run to get summary in console if needed, or parse the junit
        # SUMMARY=$(grep -E 'tests [0-9]+, pass [0-9]+' test-output.txt | tail -n 1)
        # Using junit for consistency:
        PASSED=$(grep -oP 'tests="\K[^"]+' js-results.xml | head -1)
        FAILURES=$(grep -oP 'failures="\K[^"]+' js-results.xml | head -1)
        ERRORS=$(grep -oP 'errors="\K[^"]+' js-results.xml | head -1)
        if [ -z "$PASSED" ]; then SUMMARY="JS Tests: Result not found"; else SUMMARY="JS Tests: $PASSED tests, $FAILURES failures, $ERRORS errors"; fi
        echo "summary=$SUMMARY" >> $GITHUB_OUTPUT

    - name: Upload JS test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: js-test-results
        path: js-results.xml

  publish:
    name: Build and Release
    needs: [test-python, test-js]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Generate build summary
      run: |
        echo "### Docker Image Published" >> $GITHUB_STEP_SUMMARY
        echo "You can pull the images using the following commands:" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo '```bash' >> $GITHUB_STEP_SUMMARY
        echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | sed 's/^/docker pull /' >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Unit Test Results" >> $GITHUB_STEP_SUMMARY
        echo "- ${{ needs.test-python.outputs.results }}" >> $GITHUB_STEP_SUMMARY
        echo "- ${{ needs.test-js.outputs.results }}" >> $GITHUB_STEP_SUMMARY

    - name: Extract Release Notes from CHANGELOG.md
      id: changelog_reader
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        python scripts/extract_release_notes.py "$VERSION" "$REGISTRY/$IMAGE_NAME"

    - name: Create Release
      id: create_release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        body_path: release_notes.txt
        generate_release_notes: true
        draft: false
        prerelease: false
