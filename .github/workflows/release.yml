name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Release Notes from CHANGELOG.md
        id: changelog_reader
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          python -c "
          import sys, re
          with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
              content = f.read()
          pattern = rf'## \[{re.escape(VERSION)}\] - \d{{4}}-\d{{2}}-\d{{2}}\n(.*?)(?=\n## \[|\Z)'
          match = re.search(pattern, content, re.DOTALL)
          if match:
              notes = match.group(1).strip()
              with open('release_notes.txt', 'w', encoding='utf-8') as out:
                  out.write(notes)
          else:
              print(f'Warning: Version {VERSION} not found in CHANGELOG.md')
              with open('release_notes.txt', 'w', encoding='utf-8') as out:
                  out.write('No release notes found in CHANGELOG.md for this version.')
          "

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.txt
          generate_release_notes: true
          draft: false
          prerelease: false
