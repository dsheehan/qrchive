name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Release Notes from CHANGELOG.md
        id: changelog_reader
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          REGISTRY: ghcr.io
          IMAGE_NAME: ${{ github.repository }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          python scripts/extract_release_notes.py "$VERSION" "$REGISTRY/$IMAGE_NAME"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.txt
          generate_release_notes: true
          draft: false
          prerelease: false
